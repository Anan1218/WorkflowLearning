# Fly.io config for the API only - deploy with `fly deploy --local-only`.
# The frontend lives on Vercel (rli-demo.stelloagents.com), which proxies /api here.
# Auto-stop keeps idle cost near zero; the UI's 1.5s job polling keeps the
# machine awake while an extraction is running.

app = "rli-demo"
primary_region = "sjc"

[build]
  build-target = "api"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "wl_data"
  destination = "/app/data"
